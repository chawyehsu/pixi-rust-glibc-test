[workspace]
authors = ["Chawye Hsu <su+git@chawyehsu.com>"]
channels = ["conda-forge"]
name = "pixi-rust-glibc-test"
platforms = ["osx-arm64", "linux-64", "linux-aarch64", "win-64"]
version = "0.1.0"
preview = ["pixi-build"]

[pypi-options]
index-url = "https://mirrors.cernet.edu.cn/pypi/web/simple"

[tasks]
build = { cmd = "pixi build" }

[workspace.target.linux-64.build-variants]
c_stdlib = ["sysroot"]
c_stdlib_version = ["2.17"]

# [package.build.target.linux-64.config]
# compilers = ["rust", "c"]

[package.build]
backend = { name = "pixi-build-rust", version = "*" }

[dependencies]
libarchive = ">=3.8.7,<4"
