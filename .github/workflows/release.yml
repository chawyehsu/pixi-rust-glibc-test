name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Draft Release
        uses: chawyehsu/actions/create-release@main
        with:
          tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
