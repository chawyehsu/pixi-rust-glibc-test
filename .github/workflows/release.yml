name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: |
          # Build the project and create release artifacts
          # (This is a placeholder; replace with actual build commands)
          mkdir -p artifacts
          echo "Dummy artifact content" > artifacts/app-mac.tar.gz
          echo "Dummy artifact content" > artifacts/app-windows.msi
          echo "Dummy artifact content" > artifacts/app-windows.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: artifacts

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release
          merge-multiple: true

      - name: Rename artifacts
        run: |
          version="${VERSION#v}"
          for f in release/app-*.tar.gz release/app-*.msi release/app-*.zip; do
            mv "$f" "release/app-${version}-${f#release/app-}"
          done
          ls -la release

      - name: Draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${VERSION#v}"
          gh release create "$tag" release/* --title "$tag" --draft \
            || gh release upload "$tag" release/* --clobber
